<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBot</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Sidebar toggle (fixed, slides with sidebar) -->
  <button id="sidebar-toggle" title="Chat history">☰</button>

  <!-- Theme toggle (fixed, far right) -->
  <button id="theme-btn" title="Theme wechseln">☀️</button>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span>Chats</span>
      <button id="new-chat-btn" title="New Chat">+</button>
    </div>
    <div id="session-list"></div>
  </aside>

  <header>
    <div id="header-left">
      <span>ChatBot</span>
    </div>
    <div id="header-right">
      <div id="token-display" title="Token usage">
        <svg id="token-ring" viewBox="0 0 36 36" width="36" height="36">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="#2a2a2a" stroke-width="3.5"/>
          <circle id="token-arc" cx="18" cy="18" r="15.9" fill="none"
            stroke="#2f6df5" stroke-width="3.5"
            stroke-dasharray="0 100" stroke-dashoffset="25"
            stroke-linecap="round"/>
        </svg>
        <span id="token-label">—</span>
      </div>
      <button id="tts-btn" title="Toggle voice output">🔇</button>
      <button id="settings-btn" title="System Prompt">⚙️</button>
    </div>
  </header>

  <div id="docs-modal" hidden>
    <div id="docs-box">
      <h2>Documents</h2>
      <ul id="docs-list"></ul>
      <p id="upload-status"></p>
      <div id="settings-actions">
        <button id="docs-close">Close</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" hidden>
    <div id="settings-box">
      <h2>System Prompt</h2>
      <textarea id="system-prompt-input" placeholder="Describe the bot's behavior, tone, language, restrictions…"></textarea>
      <div id="settings-actions">
        <button id="settings-cancel">Cancel</button>
        <button id="settings-save">Save & Reload</button>
      </div>
    </div>
  </div>

  <div id="drop-overlay" hidden>
    <span>Drop document here</span>
  </div>

  <div id="chat"></div>

  <div id="edit-indicator" hidden>
    <span>Nachricht bearbeiten</span>
    <button id="edit-cancel" title="Abbrechen">✕</button>
  </div>

  <div id="attachment-bar" hidden>
    <span id="attachment-name"></span>
    <button id="attachment-remove">✕</button>
  </div>

  <div id="input-area">
    <button id="upload-btn" title="Attach document">📎</button>
    <input type="file" id="upload-input" accept=".txt,.md,.pdf" hidden />
    <textarea id="user-input" placeholder="Type a message…" rows="1"></textarea>
    <button id="mic-btn" title="Voice input">🎤</button>
    <button id="send-btn">&#9658;</button>
    <button id="stop-btn" hidden>&#9646;&#9646;</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@14/marked.min.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
