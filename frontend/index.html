<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Workspace</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
</head>
<body>
  <!-- Sidebar toggle -->
  <button id="sidebar-toggle" title="Chat history">☰</button>

  <!-- Top-right controls -->
  <div id="top-right-fixed">
    <button id="tts-btn" title="Toggle voice output">
      <svg id="tts-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <svg id="tts-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" hidden>
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <line x1="23" y1="9" x2="17" y2="15"/>
        <line x1="17" y1="9" x2="23" y2="15"/>
      </svg>
    </button>
    <button id="header-logout-btn" title="Log out">⏻</button>
    <button id="theme-btn" title="Toggle theme">☀️</button>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span>Chats</span>
      <button id="new-chat-btn" title="New Chat">+</button>
    </div>
    <div id="session-list"></div>
    <div id="sidebar-footer">
      <div id="sidebar-user">
        <div id="avatar">
          <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-3.9 3.6-7 8-7s8 3.1 8 7"/>
          </svg>
        </div>
        <span id="sidebar-username"></span>
      </div>
      <button id="settings-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </aside>

  <main id="main-content">
    <header>
      <div id="header-left">
        <span>AI Workspace</span>
        <div id="model-dropdown-wrap">
          <button id="model-selector-btn" title="Switch model">
            <span id="model-selector-label">—</span>
            <svg viewBox="0 0 10 6" width="9" height="9" fill="currentColor"><path d="M0 0l5 6 5-6z"/></svg>
          </button>
          <div id="model-dropdown" hidden>
            <div id="model-dropdown-list"></div>
            <button id="model-dropdown-manage">Manage in Settings…</button>
          </div>
        </div>
      </div>
      <div id="header-right"></div>
    </header>

    <div id="chat"></div>

    <div id="home-hero" hidden>
      <p id="home-title">How can I help you today?</p>
    </div>

    <div id="attachment-bar" hidden>
      <div class="attachment-card">
        <div class="attachment-card-icon">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
        </div>
        <div class="attachment-card-meta">
          <span id="attachment-name"></span>
          <span id="attachment-ext"></span>
        </div>
      </div>
      <button id="attachment-remove">✕</button>
    </div>

    <div id="input-area">
      <button id="upload-btn" title="Attach document">+</button>
      <input type="file" id="upload-input" accept=".txt,.md,.pdf" hidden />
      <textarea id="user-input" placeholder="Type a message…" rows="1"></textarea>
      <button id="mic-btn" title="Voice input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0M12 19v3M8 22h8"/>
        </svg>
      </button>
      <div id="token-display" title="Token usage">
        <svg id="token-ring" viewBox="0 0 36 36" width="26" height="26">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="#2a2a2a" stroke-width="3.5"/>
          <circle id="token-arc" cx="18" cy="18" r="15.9" fill="none"
            stroke="#2f6df5" stroke-width="3.5"
            stroke-dasharray="0 100" stroke-dashoffset="25"
            stroke-linecap="round"/>
        </svg>
        <span id="token-label">—</span>
      </div>
      <button id="send-btn">&#9658;</button>
      <button id="stop-btn" hidden>&#9646;&#9646;</button>
    </div>
  </main>

  <div id="docs-modal" hidden>
    <div id="docs-box">
      <h2>Documents</h2>
      <ul id="docs-list"></ul>
      <p id="upload-status"></p>
      <div id="settings-actions">
        <button id="docs-close">Close</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" hidden>
    <div id="settings-box">

      <div id="settings-tabs">
        <button class="settings-tab active" data-tab="prompt">System Prompt</button>
        <button class="settings-tab" data-tab="model">Model</button>
        <button class="settings-tab" data-tab="ui">UI</button>
      </div>

      <!-- System Prompt tab -->
      <div id="settings-tab-prompt" class="settings-panel">
        <textarea id="system-prompt-input" placeholder="Describe the bot's behavior, tone, language, restrictions…"></textarea>
      </div>

      <!-- Model tab -->
      <div id="settings-tab-model" class="settings-panel" hidden>
        <div class="model-field">
          <label for="provider-select">Provider</label>
          <select id="provider-select">
            <option value="gemini">Google Gemini</option>
            <option value="openai">OpenAI / Compatible (Ollama, LM Studio…)</option>
            <option value="anthropic">Anthropic Claude</option>
          </select>
        </div>

        <div class="model-field">
          <label for="model-name-input">Model</label>
          <input id="model-name-input" type="text" list="model-suggestions" placeholder="e.g. gemini-2.5-flash" autocomplete="off" />
          <datalist id="model-suggestions"></datalist>
        </div>

        <div class="model-field">
          <label for="api-key-input">API Key <span class="field-hint">(leave empty to use environment variable)</span></label>
          <input id="api-key-input" type="password" placeholder="sk-…" autocomplete="new-password" />
        </div>

        <div class="model-field" id="base-url-field">
          <label for="base-url-input">Base URL <span class="field-hint">(for Ollama: http://localhost:11434/v1)</span></label>
          <div id="base-url-row">
            <input id="base-url-input" type="text" placeholder="http://localhost:11434/v1" />
            <button id="detect-ollama-btn" type="button">Detect models</button>
          </div>
        </div>

        <div class="model-field model-field-row">
          <label for="reasoning-toggle">
            Reasoning
            <span class="field-hint">(extended thinking for claude-3-7-sonnet &amp; gemini-2.5; tag-parsing for deepseek-r1/qwq; chain-of-thought for all others)</span>
          </label>
          <input type="checkbox" id="reasoning-toggle" />
        </div>
      </div>

      <!-- UI tab -->
      <div id="settings-tab-ui" class="settings-panel" hidden>
        <div class="model-field model-field-row">
          <label for="stream-speed-select">Streaming speed</label>
          <select id="stream-speed-select">
            <option value="0">Instant</option>
            <option value="4">Fast</option>
            <option value="8">Normal</option>
            <option value="20">Slow</option>
          </select>
        </div>
      </div>

      <div id="settings-actions">
        <button id="settings-cancel">Cancel</button>
        <button id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <div id="drop-overlay" hidden>
    <span>Drop document here</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script type="module" src="modules/main.js"></script>
  <script>
    // Redirect to login on 401 from any fetch
    const _origFetch = window.fetch;
    window.fetch = async (...args) => {
      const res = await _origFetch(...args);
      if (res.status === 401) { window.location.href = "/login"; }
      return res;
    };
  </script>
</body>
</html>
