<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBot</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
</head>
<body>
  <!-- Sidebar toggle -->
  <button id="sidebar-toggle" title="Chat history">☰</button>

  <!-- Top-right controls -->
  <div id="top-right-fixed">
    <button id="header-logout-btn" title="Log out">⏻</button>
    <button id="theme-btn" title="Toggle theme">☀️</button>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-header">
      <span>Chats</span>
      <button id="new-chat-btn" title="New Chat">+</button>
    </div>
    <div id="session-list"></div>
    <div id="sidebar-footer">
      <span id="sidebar-username"></span>
      <button id="settings-btn" title="Settings">⚙️</button>
    </div>
  </aside>

  <main id="main-content">
    <header>
      <div id="header-left">
        <span>ChatBot</span>
      </div>
      <div id="header-right">
        <button id="tts-btn" title="Toggle voice output">🔇</button>
      </div>
    </header>

    <div id="chat"></div>

    <div id="edit-indicator" hidden>
      <span>Editing message</span>
      <button id="edit-cancel" title="Cancel">✕</button>
    </div>

    <div id="attachment-bar" hidden>
      <span id="attachment-name"></span>
      <button id="attachment-remove">✕</button>
    </div>

    <div id="input-area">
      <button id="upload-btn" title="Attach document">📎</button>
      <input type="file" id="upload-input" accept=".txt,.md,.pdf" hidden />
      <textarea id="user-input" placeholder="Type a message…" rows="1"></textarea>
      <button id="mic-btn" title="Voice input">🎤</button>
      <div id="token-display" title="Token usage">
        <svg id="token-ring" viewBox="0 0 36 36" width="26" height="26">
          <circle cx="18" cy="18" r="15.9" fill="none" stroke="#2a2a2a" stroke-width="3.5"/>
          <circle id="token-arc" cx="18" cy="18" r="15.9" fill="none"
            stroke="#2f6df5" stroke-width="3.5"
            stroke-dasharray="0 100" stroke-dashoffset="25"
            stroke-linecap="round"/>
        </svg>
        <span id="token-label">—</span>
      </div>
      <button id="send-btn">&#9658;</button>
      <button id="stop-btn" hidden>&#9646;&#9646;</button>
    </div>
  </main>

  <div id="docs-modal" hidden>
    <div id="docs-box">
      <h2>Documents</h2>
      <ul id="docs-list"></ul>
      <p id="upload-status"></p>
      <div id="settings-actions">
        <button id="docs-close">Close</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" hidden>
    <div id="settings-box">

      <div id="settings-tabs">
        <button class="settings-tab active" data-tab="prompt">System Prompt</button>
        <button class="settings-tab" data-tab="model">Model</button>
      </div>

      <!-- System Prompt tab -->
      <div id="settings-tab-prompt" class="settings-panel">
        <textarea id="system-prompt-input" placeholder="Describe the bot's behavior, tone, language, restrictions…"></textarea>
      </div>

      <!-- Model tab -->
      <div id="settings-tab-model" class="settings-panel" hidden>
        <div class="model-field">
          <label for="provider-select">Provider</label>
          <select id="provider-select">
            <option value="gemini">Google Gemini</option>
            <option value="openai">OpenAI / Compatible (Ollama, LM Studio…)</option>
            <option value="anthropic">Anthropic Claude</option>
          </select>
        </div>

        <div class="model-field">
          <label for="model-name-input">Model</label>
          <input id="model-name-input" type="text" list="model-suggestions" placeholder="e.g. gemini-2.5-flash" autocomplete="off" />
          <datalist id="model-suggestions"></datalist>
        </div>

        <div class="model-field">
          <label for="api-key-input">API Key <span class="field-hint">(leave empty to use environment variable)</span></label>
          <input id="api-key-input" type="password" placeholder="sk-…" autocomplete="new-password" />
        </div>

        <div class="model-field" id="base-url-field">
          <label for="base-url-input">Base URL <span class="field-hint">(for Ollama: http://localhost:11434/v1)</span></label>
          <div id="base-url-row">
            <input id="base-url-input" type="text" placeholder="http://localhost:11434/v1" />
            <button id="detect-ollama-btn" type="button">Detect models</button>
          </div>
        </div>
      </div>

      <div id="settings-actions">
        <button id="settings-cancel">Cancel</button>
        <button id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <div id="drop-overlay" hidden>
    <span>Drop document here</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script type="module" src="modules/main.js"></script>
  <script>
    // Redirect to login on 401 from any fetch
    const _origFetch = window.fetch;
    window.fetch = async (...args) => {
      const res = await _origFetch(...args);
      if (res.status === 401) { window.location.href = "/login"; }
      return res;
    };
  </script>
</body>
</html>
