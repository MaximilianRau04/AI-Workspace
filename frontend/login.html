<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChatBot - Login</title>
  <link rel="icon" href="data:,">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 1.2rem;
      padding: 2rem 2.2rem;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .auth-title {
      font-size: 1.3rem;
      font-weight: 700;
      text-align: center;
      color: #fff;
    }

    .auth-tabs {
      display: flex;
      border: 1px solid #2e2e2e;
      border-radius: 0.6rem;
      overflow: hidden;
    }

    .auth-tab {
      flex: 1;
      padding: 0.55rem;
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      background: none;
      border: none;
      color: #666;
      transition: background 0.15s, color 0.15s;
    }

    .auth-tab.active {
      background: #2f6df5;
      color: #fff;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .auth-form[hidden] { display: none; }

    .auth-form label {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.2rem;
      display: block;
    }

    .auth-form input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #2e2e2e;
      border-radius: 0.6rem;
      color: #e5e5e5;
      font-size: 0.95rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
    }

    .auth-form input:focus { border-color: #2f6df5; }

    .auth-submit {
      background: #2f6df5;
      border: none;
      border-radius: 0.7rem;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.7rem;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.2rem;
    }

    .auth-submit:hover { background: #1a5de0; }
    .auth-submit:disabled { background: #1e2a40; cursor: not-allowed; }

    .auth-error {
      font-size: 0.85rem;
      color: #e88;
      background: #2a1010;
      border: 1px solid #5a1f1f;
      border-radius: 0.5rem;
      padding: 0.55rem 0.8rem;
      display: none;
    }

    .auth-error.visible { display: block; }

    .field-hint {
      font-size: 0.76rem;
      margin-top: 0.3rem;
      min-height: 1rem;
      transition: color 0.15s;
    }

    .field-hint.warn  { color: #e8a33a; }
    .field-hint.error { color: #e87a7a; }
    .field-hint.ok    { color: #4caf50; }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-title">ChatBot</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login">Login</button>
      <button class="auth-tab" id="tab-register">Register</button>
    </div>

    <div id="error-msg" class="auth-error"></div>

    <!-- Login form -->
    <form class="auth-form" id="form-login">
      <div>
        <label for="login-username">username</label>
        <input id="login-username" type="text" placeholder="username" autocomplete="username" required />
      </div>
      <div>
        <label for="login-password">password</label>
        <input id="login-password" type="password" placeholder="password" autocomplete="current-password" required />
      </div>
      <button class="auth-submit" type="submit">Login</button>
    </form>

    <!-- Register form -->
    <form class="auth-form" id="form-register" hidden>
      <div>
        <label for="reg-username">username</label>
        <input id="reg-username" type="text" placeholder="at least 3 characters" autocomplete="username" required />
      </div>
      <div>
        <label for="reg-password">password</label>
        <input id="reg-password" type="password" placeholder="at least 6 characters" autocomplete="new-password" required />
        <div class="field-hint" id="hint-pw"></div>
      </div>
      <div>
        <label for="reg-password2">Confirm password</label>
        <input id="reg-password2" type="password" placeholder="Confirm password" autocomplete="new-password" required />
        <div class="field-hint" id="hint-pw2"></div>
      </div>
      <button class="auth-submit" type="submit">Register</button>
    </form>
  </div>

  <script>
    const tabLogin    = document.getElementById("tab-login");
    const tabRegister = document.getElementById("tab-register");
    const formLogin   = document.getElementById("form-login");
    const formReg     = document.getElementById("form-register");
    const errorMsg    = document.getElementById("error-msg");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add("visible");
    }

    function hideError() {
      errorMsg.classList.remove("visible");
    }

    tabLogin.addEventListener("click", () => {
      tabLogin.classList.add("active");
      tabRegister.classList.remove("active");
      formLogin.hidden = false;
      formReg.hidden = true;
      hideError();
    });

    tabRegister.addEventListener("click", () => {
      tabRegister.classList.add("active");
      tabLogin.classList.remove("active");
      formReg.hidden = false;
      formLogin.hidden = true;
      hideError();
    });

    formLogin.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();
      const btn = formLogin.querySelector("button");
      btn.disabled = true;
      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("login-username").value,
          password: document.getElementById("login-password").value,
        }),
      });
      const data = await res.json();
      if (res.ok) {
        window.location.href = "/";
      } else {
        showError(data.error || "Error logging in");
        btn.disabled = false;
      }
    });

    const regPw   = document.getElementById("reg-password");
    const regPw2  = document.getElementById("reg-password2");
    const hintPw  = document.getElementById("hint-pw");
    const hintPw2 = document.getElementById("hint-pw2");

    regPw.addEventListener("input", () => {
      const len = regPw.value.length;
      if (len === 0) {
        hintPw.textContent = "";
        hintPw.className = "field-hint";
      } else if (len < 6) {
        hintPw.textContent = "Too short";
        hintPw.className = "field-hint warn";
      } else {
        hintPw.textContent = "✓ OK";
        hintPw.className = "field-hint ok";
      }
      // re-check confirm field if already filled
      if (regPw2.value.length > 0) regPw2.dispatchEvent(new Event("input"));
    });

    regPw2.addEventListener("input", () => {
      if (regPw2.value.length === 0) {
        hintPw2.textContent = "";
        hintPw2.className = "field-hint";
      } else if (regPw2.value !== regPw.value) {
        hintPw2.textContent = "Passwords do not match";
        hintPw2.className = "field-hint error";
      } else {
        hintPw2.textContent = "✓ Match";
        hintPw2.className = "field-hint ok";
      }
    });

    formReg.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();
      const pw  = regPw.value;
      const pw2 = regPw2.value;
      if (pw !== pw2) { showError("Passwords do not match"); return; }
      const btn = formReg.querySelector("button");
      btn.disabled = true;
      const res = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: document.getElementById("reg-username").value,
          password: pw,
        }),
      });

      const data = await res.json();
      if (res.ok) {
        window.location.href = "/";
      } else {
        showError(data.error || "Error registering");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
